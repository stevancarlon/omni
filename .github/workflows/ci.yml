name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omni-mobile
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew lintCommunityDebug testCommunityDebugUnitTest assembleCommunityDebug

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omni_backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: omni_backend_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d omni_backend_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      MIX_ENV: test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
    steps:
      - uses: actions/checkout@v7
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: actions/cache@v6
        with:
          path: omni_backend/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('omni_backend/mix.lock') }}
      - run: mix deps.get
      - run: mix precommit
