name: Bug report
description: Report a reproducible Android or backend problem using sanitized data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, private screenshots, messages, contacts, tokens, or security vulnerabilities.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Android app
        - Backend
        - Setup or documentation
        - Both app and backend
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Omni commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Device, Android version, operating system, and relevant tool versions.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Sanitized reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized logs
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal data and understand that vulnerabilities must be reported privately.
          required: true
