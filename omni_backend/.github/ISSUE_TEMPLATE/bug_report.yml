name: Bug report
description: Report a reproducible backend problem using sanitized data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never include .env contents, tokens, service-account JSON, screenshots, prompts, or vulnerabilities.
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Sanitized reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized logs
    validations:
      required: true
