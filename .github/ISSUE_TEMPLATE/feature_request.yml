name: Feature request
description: Propose a focused safety, accessibility, compatibility, or self-hosting improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What contributor or user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Privacy and safety impact
    validations:
      required: true
